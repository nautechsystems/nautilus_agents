---
repos:
  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: forbid-new-submodules
      - id: end-of-file-fixer
        types_or: [rust, markdown, json, yaml]
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: debug-statements
      - id: detect-private-key
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-sr", "-ln", "bash", "-w"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        name: dockerfile-lint
        description: Lint Dockerfiles for best practices and errors

  - repo: https://github.com/crate-ci/typos
    rev: v1.40.0  # Pinned: autoupdate bumps to moving v1 tag
    hooks:
      - id: typos
        description: Checks for common typos
        args: ["--force-exclude"]
        types_or: [rust, toml, yaml, markdown, javascript]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        description: Checks for common misspellings
        types_or: [rust, toml, yaml, markdown, javascript]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secrets scan)
        description: Detects hard-coded secrets prior to commit
        args: ["--staged", "--redact"]

  # GitHub Actions linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        name: actionlint (syntax/structure)
        description: Checks GitHub Actions workflow syntax

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor
        name: zizmor (security)
        description: Scans GitHub Actions for security issues
        args: ["--no-online-audits", "--min-severity", "medium", ".github/"]
        pass_filenames: false

  # Custom hooks
  - repo: local
    hooks:
      - id: check-hidden-chars
        name: check hidden unicode/control chars
        description: Fail on hidden control or zero-width chars
        entry: bash .pre-commit-hooks/check_hidden_chars.sh
        language: system
        types_or: [rust, toml, markdown, yaml, json, text]
        files: '\.(rs|toml|md|yml|yaml|json|sh|js|html)$|Dockerfile.*'

      - id: check-non-latin-text
        name: check non-Latin text
        description: Detect non-Latin characters to enforce English
        entry: bash .pre-commit-hooks/check_non_latin_text.sh
        language: system
        types: [text]
        files: '\.(rs|md|toml|yaml|yml)$'

      - id: check-toml-codegen
        name: check toml-codegen
        description: Block codegen-backend keyword in TOML
        entry: bash .pre-commit-hooks/check_toml_codegen.sh
        language: system
        files: \.toml$

      - id: check-todo-exclamation
        name: check todo! markers
        description: Block TODO! markers from being committed
        entry: bash .pre-commit-hooks/check_todo_exclamation.sh
        language: system
        types: [text]
        pass_filenames: false

      - id: check-error-conventions
        name: check error conventions
        description: Enforces error variable naming conventions
        entry: bash .pre-commit-hooks/check_error_conventions.sh
        language: system
        types_or: [rust]
        pass_filenames: false

  # Rust formatting and linting
  - repo: local
    hooks:
      - id: check-anyhow-usage
        name: check anyhow usage
        description: Enforces anyhow conventions
        entry: bash .pre-commit-hooks/check_anyhow_usage.sh
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: check-logging-conventions
        name: check logging conventions
        description: Enforces logging conventions
        entry: bash .pre-commit-hooks/check_logging_conventions.sh
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: check-tokio-usage
        name: check tokio usage
        description: Enforces tokio usage conventions
        entry: bash .pre-commit-hooks/check_tokio_usage.sh
        language: system
        files: '\.rs$|Cargo\.toml$'
        pass_filenames: false

      - id: check-testing-conventions
        name: check testing conventions
        description: Enforces testing conventions
        entry: bash .pre-commit-hooks/check_testing_conventions.sh
        language: system
        types_or: [rust]
        pass_filenames: false

      - id: check-formatting-rs
        name: check formatting (Rust)
        description: Enforces formatting conventions in Rust code
        entry: bash .pre-commit-hooks/check_formatting_rs.sh
        language: system
        files: '\.rs$'
        pass_filenames: false

      - id: check-docs-conventions
        name: check docs conventions
        description: Enforces documentation conventions
        entry: bash .pre-commit-hooks/check_docs_conventions.sh
        language: system
        files: '\.(rs|md)$'
        pass_filenames: false

      - id: check-cargo-conventions
        name: check cargo conventions
        description: Enforces Cargo.toml dependency ordering
        entry: bash .pre-commit-hooks/check_cargo_conventions.sh
        language: system
        files: 'Cargo\.toml$'
        pass_filenames: false

      - id: fmt
        name: cargo fmt
        description: Format files with cargo +nightly fmt
        entry: cargo +nightly fmt
        language: system
        args: ["--all", "--", "--check"]
        files: '\.(rs|toml)$'
        types: [file]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Run the Clippy linter on the agents crate
        entry: cargo clippy
        language: system
        args:
          - "-p"
          - nautilus-agents
          - "--all-targets"
          - "--"
          - "-D"
          - warnings
        files: '\.(rs|toml)$'
        types: [file]
        pass_filenames: false

  # Markdown formatting and linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        name: markdownlint
        entry: markdownlint-cli2
        args:
          - --config
          - .markdownlint.jsonc
          - --fix
        files: "\\.md$"
